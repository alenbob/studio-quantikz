<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantikzz Bug Reports</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101319;
        --panel: rgba(16, 20, 28, 0.82);
        --panel-strong: rgba(19, 25, 35, 0.96);
        --border: rgba(255, 255, 255, 0.1);
        --text: #ecf2f8;
        --muted: #9aabba;
        --accent: #69b3ff;
        --accent-soft: rgba(105, 179, 255, 0.14);
        --success: #90e0b0;
        --danger: #ff9a9a;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(105, 179, 255, 0.18), transparent 28%),
          radial-gradient(circle at 85% 10%, rgba(127, 224, 188, 0.12), transparent 22%),
          linear-gradient(180deg, #161b23 0%, var(--bg) 100%);
        color: var(--text);
      }

      .shell {
        width: min(1240px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .hero {
        display: grid;
        gap: 20px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 0.74rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-family: Georgia, serif;
        font-size: clamp(2rem, 3vw, 3.2rem);
        font-weight: 600;
        letter-spacing: -0.03em;
      }

      .subtitle {
        margin: 10px 0 0;
        max-width: 72ch;
        color: var(--muted);
        line-height: 1.6;
      }

      .toolbar,
      .report-card,
      .empty-state {
        border: 1px solid var(--border);
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(180px, 220px) minmax(180px, 220px) auto;
        gap: 14px;
        padding: 18px;
        border-radius: 24px;
        margin-bottom: 22px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      input,
      button,
      textarea {
        font: inherit;
      }

      input {
        width: 100%;
        min-height: 46px;
        padding: 0 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
      }

      button {
        min-height: 46px;
        padding: 0 18px;
        border: 0;
        border-radius: 14px;
        background: linear-gradient(135deg, #69b3ff, #8be0d5);
        color: #08111c;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .actions {
        display: flex;
        align-items: end;
        gap: 10px;
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin: 10px 2px 18px;
        color: var(--muted);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .status-pill.error {
        color: var(--danger);
      }

      .status-pill.success {
        color: var(--success);
      }

      .reports {
        display: grid;
        gap: 16px;
      }

      .report-card {
        border-radius: 24px;
        padding: 20px;
      }

      .report-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
        margin-bottom: 14px;
      }

      .report-title {
        margin: 0;
        font-size: 1.25rem;
        line-height: 1.3;
      }

      .report-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 0;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.8rem;
        font-weight: 600;
      }

      .report-date {
        color: var(--muted);
        font-size: 0.92rem;
        white-space: nowrap;
      }

      .description {
        margin: 0 0 16px;
        color: var(--text);
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .detail {
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .detail strong {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .detail a {
        color: var(--accent);
      }

      .screenshot-frame {
        margin: 0 0 16px;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }

      .screenshot-frame img {
        display: block;
        width: 100%;
        height: auto;
        max-height: 420px;
        object-fit: contain;
        background: #0b0f15;
      }

      .screenshot-caption {
        margin: 0;
        padding: 10px 14px 12px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      details {
        border-radius: 18px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        margin-top: 12px;
      }

      summary {
        cursor: pointer;
        list-style: none;
        padding: 14px 16px;
        font-weight: 600;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      pre {
        margin: 0;
        padding: 0 16px 16px;
        overflow: auto;
        color: #d9e7f5;
        font: 0.88rem/1.5 "SFMono-Regular", "Menlo", monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .empty-state {
        padding: 24px;
        border-radius: 24px;
        color: var(--muted);
      }

      @media (max-width: 960px) {
        .toolbar {
          grid-template-columns: 1fr;
        }

        .actions {
          align-items: stretch;
        }

        .detail-grid {
          grid-template-columns: 1fr;
        }

        .report-head,
        .status-bar {
          flex-direction: column;
          align-items: start;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Private Admin</p>
          <h1>Bug Reports</h1>
          <p class="subtitle">
            This page reads submitted bug reports from the server-side storage layer on Vercel.
            Access is protected by your admin token and the token stays in this browser session only.
          </p>
        </div>
      </section>

      <section class="toolbar">
        <label>
          Admin token
          <input id="token" type="password" autocomplete="current-password" placeholder="BUG_REPORT_ADMIN_TOKEN" />
        </label>
        <label>
          Search
          <input id="search" type="search" placeholder="Filter by title, description, email, code..." />
        </label>
        <label>
          Limit
          <input id="limit" type="number" min="1" max="200" value="50" />
        </label>
        <div class="actions">
          <button id="load" type="button">Load reports</button>
          <button id="clear" class="secondary" type="button">Clear token</button>
        </div>
      </section>

      <section class="status-bar">
        <div id="status" class="status-pill">Enter your admin token, then load reports.</div>
        <div id="count"></div>
      </section>

      <section id="reports" class="reports"></section>
    </main>

    <script>
      const tokenInput = document.getElementById("token");
      const searchInput = document.getElementById("search");
      const limitInput = document.getElementById("limit");
      const loadButton = document.getElementById("load");
      const clearButton = document.getElementById("clear");
      const statusNode = document.getElementById("status");
      const countNode = document.getElementById("count");
      const reportsNode = document.getElementById("reports");

      const SESSION_KEY = "quantikzz_bug_report_admin_token";
      let reports = [];

      function getReportComment(report) {
        if (typeof report.description === "string" && report.description.trim()) {
          return report.description;
        }

        if (typeof report.comment === "string" && report.comment.trim()) {
          return report.comment;
        }

        if (typeof report.message === "string" && report.message.trim()) {
          return report.message;
        }

        return "";
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function setStatus(message, kind = "neutral") {
        statusNode.textContent = message;
        statusNode.className = `status-pill${kind === "error" ? " error" : kind === "success" ? " success" : ""}`;
      }

      function formatDate(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
      }

      function renderReport(report) {
        const comment = getReportComment(report);
        const meta = [
          report.email ? `<span class="chip">${escapeHtml(report.email)}</span>` : "",
          `<span class="chip">${escapeHtml(report.storage)}</span>`,
          report.pageUrl ? `<span class="chip">page captured</span>` : "",
          report.code ? `<span class="chip">code attached</span>` : "",
          report.preamble ? `<span class="chip">preamble attached</span>` : "",
          report.previewImageStorageKey ? `<span class="chip">preview image attached</span>` : ""
        ].filter(Boolean).join("");

        return `
          <article class="report-card">
            <div class="report-head">
              <div>
                <h2 class="report-title">${escapeHtml(report.title)}</h2>
                <div class="report-meta">${meta}</div>
              </div>
              <div class="report-date">${escapeHtml(formatDate(report.submittedAt))}</div>
            </div>
            <p class="description">${comment ? escapeHtml(comment) : "No user comment provided."}</p>
            ${report.previewImageStorageKey ? `
              <figure class="screenshot-frame">
                <img
                  alt="Attached preview image"
                  data-preview-storage-key="${escapeHtml(report.previewImageStorageKey)}"
                />
                <p class="screenshot-caption">Rendered preview image attached at submission time.</p>
              </figure>
            ` : ""}
            <div class="detail-grid">
              <div class="detail">
                <strong>ID</strong>
                <div>${escapeHtml(report.id)}</div>
              </div>
              <div class="detail">
                <strong>Storage Key</strong>
                <div>${escapeHtml(report.storageKey)}</div>
              </div>
              <div class="detail">
                <strong>Page URL</strong>
                <div>${report.pageUrl ? `<a href="${escapeHtml(report.pageUrl)}" target="_blank" rel="noreferrer">${escapeHtml(report.pageUrl)}</a>` : "Not provided"}</div>
              </div>
              <div class="detail">
                <strong>User Agent</strong>
                <div>${report.userAgent ? escapeHtml(report.userAgent) : "Not provided"}</div>
              </div>
            </div>
            ${report.code ? `<details><summary>Quantikz code</summary><pre>${escapeHtml(report.code)}</pre></details>` : ""}
            ${report.preamble ? `<details><summary>Preamble</summary><pre>${escapeHtml(report.preamble)}</pre></details>` : ""}
          </article>
        `;
      }

      function filteredReports() {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) {
          return reports;
        }

        return reports.filter((report) => {
          return [
            report.title,
            getReportComment(report),
            report.email,
            report.pageUrl,
            report.userAgent,
            report.code,
            report.preamble,
            report.id
          ].some((value) => typeof value === "string" && value.toLowerCase().includes(query));
        });
      }

      function renderReports() {
        const visibleReports = filteredReports();
        countNode.textContent = `${visibleReports.length} report${visibleReports.length === 1 ? "" : "s"}`;

        if (visibleReports.length === 0) {
          reportsNode.innerHTML = `<div class="empty-state">No reports match the current filter.</div>`;
          return;
        }

        reportsNode.innerHTML = visibleReports.map(renderReport).join("");
        void loadPreviewImages();
      }

      async function loadPreviewImages() {
        const token = tokenInput.value.trim();
        if (!token) {
          return;
        }

        const imageNodes = reportsNode.querySelectorAll("img[data-preview-storage-key]");
        await Promise.all(Array.from(imageNodes).map(async (node) => {
          const storageKey = node.getAttribute("data-preview-storage-key");
          if (!storageKey) {
            return;
          }

          try {
            const response = await fetch(`/api/bug-reports?storageKey=${encodeURIComponent(storageKey)}`, {
              headers: {
                Authorization: `Bearer ${token}`
              }
            });

            if (!response.ok) {
              throw new Error("Unable to load preview image.");
            }

            const blob = await response.blob();
            node.src = URL.createObjectURL(blob);
          } catch {
            node.replaceWith(document.createTextNode("Preview image unavailable."));
          }
        }));
      }

      async function loadReports() {
        const token = tokenInput.value.trim();
        if (!token) {
          setStatus("Enter the admin token first.", "error");
          return;
        }

        sessionStorage.setItem(SESSION_KEY, token);
        setStatus("Loading reports...");
        reportsNode.innerHTML = "";

        try {
          const limit = Math.max(1, Math.min(200, Number.parseInt(limitInput.value || "50", 10) || 50));
          const response = await fetch(`/api/bug-reports?limit=${limit}`, {
            headers: {
              Authorization: `Bearer ${token}`
            }
          });
          const payload = await response.json();

          if (!response.ok || !payload.success) {
            throw new Error(payload.error || "Unable to load bug reports.");
          }

          reports = payload.reports;
          renderReports();
          setStatus(`Loaded ${reports.length} report${reports.length === 1 ? "" : "s"}.`, "success");
        } catch (error) {
          reports = [];
          renderReports();
          setStatus(error instanceof Error ? error.message : "Unable to load bug reports.", "error");
        }
      }

      loadButton.addEventListener("click", loadReports);
      clearButton.addEventListener("click", () => {
        sessionStorage.removeItem(SESSION_KEY);
        tokenInput.value = "";
        reports = [];
        renderReports();
        setStatus("Admin token cleared.");
      });
      searchInput.addEventListener("input", renderReports);

      const storedToken = sessionStorage.getItem(SESSION_KEY);
      if (storedToken) {
        tokenInput.value = storedToken;
      }

      renderReports();
    </script>
  </body>
</html>
