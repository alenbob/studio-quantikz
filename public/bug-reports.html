<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantikzz Bug Reports</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101319;
        --panel: rgba(16, 20, 28, 0.82);
        --panel-strong: rgba(19, 25, 35, 0.96);
        --border: rgba(255, 255, 255, 0.1);
        --text: #ecf2f8;
        --muted: #9aabba;
        --accent: #69b3ff;
        --accent-soft: rgba(105, 179, 255, 0.14);
        --success: #90e0b0;
        --danger: #ff9a9a;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(105, 179, 255, 0.18), transparent 28%),
          radial-gradient(circle at 85% 10%, rgba(127, 224, 188, 0.12), transparent 22%),
          linear-gradient(180deg, #161b23 0%, var(--bg) 100%);
        color: var(--text);
      }

      .shell {
        width: min(1240px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .hero {
        display: grid;
        gap: 20px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 0.74rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-family: Georgia, serif;
        font-size: clamp(2rem, 3vw, 3.2rem);
        font-weight: 600;
        letter-spacing: -0.03em;
      }

      .subtitle {
        margin: 10px 0 0;
        max-width: 72ch;
        color: var(--muted);
        line-height: 1.6;
      }

      .toolbar,
      .report-card,
      .empty-state {
        border: 1px solid var(--border);
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(180px, 220px) minmax(180px, 220px) auto;
        gap: 14px;
        padding: 18px;
        border-radius: 24px;
        margin-bottom: 22px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      input,
      button,
      textarea {
        font: inherit;
      }

      input {
        width: 100%;
        min-height: 46px;
        padding: 0 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
      }

      button {
        min-height: 46px;
        padding: 0 18px;
        border: 0;
        border-radius: 14px;
        background: linear-gradient(135deg, #69b3ff, #8be0d5);
        color: #08111c;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .actions {
        display: flex;
        align-items: end;
        gap: 10px;
      }

      .view-toggle {
        display: inline-flex;
        gap: 8px;
        padding: 4px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
      }

      .view-toggle button {
        min-height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
      }

      .view-toggle button.is-active {
        background: rgba(105, 179, 255, 0.16);
        color: var(--text);
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin: 10px 2px 18px;
        color: var(--muted);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .status-pill.error {
        color: var(--danger);
      }

      .status-pill.success {
        color: var(--success);
      }

      .reports {
        display: grid;
        gap: 16px;
      }

      .report-card {
        border-radius: 24px;
        padding: 20px;
      }

      .report-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
        margin-bottom: 14px;
      }

      .report-title {
        margin: 0;
        font-size: 1.25rem;
        line-height: 1.3;
      }

      .report-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 0;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.8rem;
        font-weight: 600;
      }

      .report-date {
        color: var(--muted);
        font-size: 0.92rem;
        white-space: nowrap;
      }

      .description {
        margin: 0 0 16px;
        color: var(--text);
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .detail {
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .detail strong {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .detail a {
        color: var(--accent);
      }

      .screenshot-frame {
        margin: 0 0 16px;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }

      .screenshot-frame img {
        display: block;
        width: 100%;
        height: auto;
        max-height: 420px;
        object-fit: contain;
        background: #0b0f15;
      }

      .screenshot-caption {
        margin: 0;
        padding: 10px 14px 12px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .field-list {
        display: grid;
        gap: 8px;
      }

      .field-row {
        display: flex;
        gap: 10px;
        align-items: start;
        line-height: 1.5;
      }

      .field-row strong {
        min-width: 120px;
        color: var(--muted);
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .field-row span,
      .field-row a {
        flex: 1;
        min-width: 0;
        word-break: break-word;
      }

      .snapshot-grid {
        display: grid;
        gap: 12px;
        padding: 0 16px 16px;
      }

      .snapshot-card {
        padding: 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .snapshot-card h4 {
        margin: 0 0 10px;
        font-size: 0.92rem;
      }

      .report-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 14px;
      }

      .report-actions button {
        min-height: 40px;
      }

      details {
        border-radius: 18px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        margin-top: 12px;
      }

      summary {
        cursor: pointer;
        list-style: none;
        padding: 14px 16px;
        font-weight: 600;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      pre {
        margin: 0;
        padding: 0 16px 16px;
        overflow: auto;
        color: #d9e7f5;
        font: 0.88rem/1.5 "SFMono-Regular", "Menlo", monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .empty-state {
        padding: 24px;
        border-radius: 24px;
        color: var(--muted);
      }

      @media (max-width: 960px) {
        .toolbar {
          grid-template-columns: 1fr;
        }

        .actions {
          align-items: stretch;
        }

        .detail-grid {
          grid-template-columns: 1fr;
        }

        .report-head,
        .status-bar {
          flex-direction: column;
          align-items: start;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Private Admin</p>
          <h1>Bug Reports</h1>
          <p class="subtitle">
            This page reads submitted bug reports from the server-side storage layer on Vercel.
            Access is protected by your admin token and the token stays in this browser session only.
          </p>
        </div>
      </section>

      <section class="toolbar">
        <label>
          Admin token
          <input id="token" type="password" autocomplete="current-password" placeholder="BUG_REPORT_ADMIN_TOKEN" />
        </label>
        <label>
          Search
          <input id="search" type="search" placeholder="Filter by title, description, email, code..." />
        </label>
        <label>
          Limit
          <input id="limit" type="number" min="1" max="200" value="50" />
        </label>
        <label>
          View
          <div class="view-toggle" role="tablist" aria-label="Bug report view">
            <button id="view-active" type="button" class="is-active" aria-pressed="true">Active</button>
            <button id="view-archived" type="button" aria-pressed="false">Archived</button>
          </div>
        </label>
        <div class="actions">
          <button id="load" type="button">Load reports</button>
          <button id="clear" class="secondary" type="button">Clear token</button>
        </div>
      </section>

      <section class="status-bar">
        <div id="status" class="status-pill">Enter your admin token, then load reports.</div>
        <div id="count"></div>
      </section>

      <section id="reports" class="reports"></section>
    </main>

    <script>
      const tokenInput = document.getElementById("token");
      const searchInput = document.getElementById("search");
      const limitInput = document.getElementById("limit");
      const viewActiveButton = document.getElementById("view-active");
      const viewArchivedButton = document.getElementById("view-archived");
      const loadButton = document.getElementById("load");
      const clearButton = document.getElementById("clear");
      const statusNode = document.getElementById("status");
      const countNode = document.getElementById("count");
      const reportsNode = document.getElementById("reports");

      const SESSION_KEY = "quantikzz_bug_report_admin_token";
      const API_BASE_SEARCH_PARAM = "apiBase";
      const API_BASE_STORAGE_KEY = "quantikzz_bug_report_api_base";
      const RESTORE_SEARCH_PARAM = "bugReportRestore";
      const RESTORE_STORAGE_PREFIX = "quantikzz_bug_report_restore_";
      let currentView = "active";
      let reports = [];

      function normalizeApiBaseUrl(value) {
        if (typeof value !== "string" || !value.trim()) {
          return "";
        }

        try {
          const parsed = new URL(value.trim());
          parsed.search = "";
          parsed.hash = "";
          if (!parsed.pathname.endsWith("/")) {
            parsed.pathname = `${parsed.pathname}/`;
          }
          return parsed.toString();
        } catch {
          return "";
        }
      }

      function resolveApiBaseUrl() {
        const params = new URLSearchParams(window.location.search);
        const fromQuery = normalizeApiBaseUrl(params.get(API_BASE_SEARCH_PARAM));
        if (fromQuery) {
          localStorage.setItem(API_BASE_STORAGE_KEY, fromQuery);
          return fromQuery;
        }

        return normalizeApiBaseUrl(localStorage.getItem(API_BASE_STORAGE_KEY));
      }

      const apiBaseUrl = resolveApiBaseUrl();

      function buildApiUrl(path) {
        const normalizedPath = String(path || "").replace(/^\/+/, "");
        if (!apiBaseUrl) {
          return `/${normalizedPath}`;
        }

        return new URL(normalizedPath, apiBaseUrl).toString();
      }

      function getReportComment(report) {
        if (typeof report.description === "string" && report.description.trim()) {
          return report.description;
        }

        if (typeof report.comment === "string" && report.comment.trim()) {
          return report.comment;
        }

        if (typeof report.message === "string" && report.message.trim()) {
          return report.message;
        }

        return "";
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function setStatus(message, kind = "neutral") {
        statusNode.textContent = message;
        statusNode.className = `status-pill${kind === "error" ? " error" : kind === "success" ? " success" : ""}`;
      }

      function formatDate(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
      }

      function renderStoredValue(value) {
        if (value === null || value === undefined || value === "") {
          return "Not provided";
        }

        if (typeof value === "string") {
          return escapeHtml(value);
        }

        return escapeHtml(JSON.stringify(value));
      }

      function renderFieldRow(label, value, options = {}) {
        const renderedValue = value && options.href
          ? `<a href="${escapeHtml(options.href)}" target="_blank" rel="noreferrer">${renderStoredValue(value)}</a>`
          : `<span>${renderStoredValue(value)}</span>`;

        return `
          <div class="field-row">
            <strong>${escapeHtml(label)}</strong>
            ${renderedValue}
          </div>
        `;
      }

      function renderScreenshotFigure(storageKey, caption) {
        if (!storageKey) {
          return "";
        }

        return `
          <figure class="screenshot-frame">
            <img
              alt="${escapeHtml(caption)}"
              data-bug-image-storage-key="${escapeHtml(storageKey)}"
            />
            <p class="screenshot-caption">${escapeHtml(caption)}</p>
          </figure>
        `;
      }

      function safeParseJson(value) {
        if (typeof value !== "string" || !value.trim()) {
          return null;
        }

        try {
          return JSON.parse(value);
        } catch {
          return null;
        }
      }

      function buildRestoreStorageKey(restoreId) {
        return `${RESTORE_STORAGE_PREFIX}${restoreId}`;
      }

      function buildRestorePayload(report) {
        const visualSnapshot = safeParseJson(report.visualCircuitSnapshot);
        const sessionSnapshot = safeParseJson(report.sessionSnapshot);

        return {
          editorState: visualSnapshot?.editorState ?? null,
          code: report.code || "",
          preamble: report.preamble || "",
          exportPanelMode: sessionSnapshot?.ui?.exportPanelMode === "symbolic" ? "symbolic" : "quantikz",
          quantikzPaneView: sessionSnapshot?.ui?.quantikzPaneView === "preamble" ? "preamble" : "content",
          symbolicPaneView: sessionSnapshot?.ui?.symbolicPaneView === "preamble" ? "preamble" : "content",
          symbolicEditorCode: typeof sessionSnapshot?.ui?.symbolicEditorCode === "string"
            ? sessionSnapshot.ui.symbolicEditorCode
            : ""
        };
      }

      function buildRestoreTargetUrl(report, restoreId) {
        let targetUrl;

        try {
          targetUrl = new URL(report.pageUrl || "/", window.location.origin);
        } catch {
          targetUrl = new URL("/", window.location.origin);
        }

        if (targetUrl.origin !== window.location.origin) {
          targetUrl = new URL("/", window.location.origin);
        }

        targetUrl.searchParams.set(RESTORE_SEARCH_PARAM, restoreId);
        return targetUrl.toString();
      }

      function openReportInEditor(report) {
        if (!report.visualCircuitSnapshot && !report.code) {
          setStatus("This report does not include restorable circuit data.", "error");
          return;
        }

        const restorePayload = buildRestorePayload(report);
        const restoreId = typeof crypto !== "undefined" && typeof crypto.randomUUID === "function"
          ? crypto.randomUUID()
          : `${Date.now()}-${Math.random().toString(36).slice(2)}`;

        localStorage.setItem(buildRestoreStorageKey(restoreId), JSON.stringify(restorePayload));
        window.open(buildRestoreTargetUrl(report, restoreId), "_blank", "noopener");
      }

      function renderSnapshotSection(title, fields) {
        const rows = fields.filter(([, value]) => value !== null && value !== undefined && value !== "");
        if (rows.length === 0) {
          return "";
        }

        return `
          <section class="snapshot-card">
            <h4>${escapeHtml(title)}</h4>
            <div class="field-list">
              ${rows.map(([label, value]) => renderFieldRow(label, typeof value === "object" ? JSON.stringify(value) : value)).join("")}
            </div>
          </section>
        `;
      }

      function renderFormattedSnapshot(report) {
        const snapshot = safeParseJson(report.sessionSnapshot);
        if (!snapshot) {
          return report.sessionSnapshot
            ? `<details><summary>Session snapshot</summary><pre>${escapeHtml(report.sessionSnapshot)}</pre></details>`
            : "";
        }

        return `
          <details>
            <summary>Session snapshot</summary>
            <div class="snapshot-grid">
              ${renderSnapshotSection("Capture", [
                ["Captured At", snapshot.capturedAt],
                ["Location", snapshot.locationHref],
                ["Viewport", snapshot.viewport]
              ])}
              ${renderSnapshotSection("UI", [
                ["Export Panel", snapshot.ui?.exportPanelMode],
                ["Quantikz View", snapshot.ui?.quantikzPaneView],
                ["Symbolic View", snapshot.ui?.symbolicPaneView],
                ["Layout", snapshot.ui?.workbenchLayoutMode],
                ["Paste Mode", snapshot.ui?.isPasteMode],
                ["Selected Structure", snapshot.ui?.selectedStructure],
                ["Selected Wire Label", snapshot.ui?.selectedWireLabel]
              ])}
              ${renderSnapshotSection("Preview", [
                ["Mode", snapshot.preview?.isSymbolicMode ? "symbolic" : "quantikz"],
                ["Preview State", snapshot.preview?.state],
                ["Preview Error", snapshot.preview?.error],
                ["Figure State", snapshot.preview?.figurePreviewState],
                ["Symbolic State", snapshot.preview?.symbolicLatexState],
                ["Symbolic Error", snapshot.preview?.symbolicLatexError]
              ])}
              ${renderSnapshotSection("Editor", [
                ["Qubits", snapshot.visualCircuitSummary?.qubits ?? snapshot.editorState?.qubits],
                ["Steps", snapshot.visualCircuitSummary?.steps ?? snapshot.editorState?.steps],
                ["Items", snapshot.visualCircuitSummary?.itemCount],
                ["Selected Items", snapshot.visualCircuitSummary?.selectedItemCount],
                ["Export Issues", snapshot.visualCircuitSummary?.exportIssueCount],
                ["Tool", snapshot.editorState?.activeTool],
                ["Selected IDs", snapshot.editorState?.selectedItemIds],
                ["Layout", snapshot.editorState?.layout],
                ["Wire Types", snapshot.editorState?.wireTypes],
                ["Wire Labels", snapshot.editorState?.wireLabels]
              ])}
            </div>
          </details>
        `;
      }

      function renderVisualCircuitSnapshot(report) {
        const snapshot = safeParseJson(report.visualCircuitSnapshot);
        if (!snapshot) {
          return report.visualCircuitSnapshot
            ? `<details><summary>Visual circuit snapshot</summary><pre>${escapeHtml(report.visualCircuitSnapshot)}</pre></details>`
            : "";
        }

        const editorState = snapshot.editorState || {};
        const summary = snapshot.summary || {};
        const itemCounts = summary.itemCounts || {};

        return `
          <details>
            <summary>Visual circuit snapshot</summary>
            <div class="snapshot-grid">
              ${renderSnapshotSection("Visual circuit", [
                ["Captured At", snapshot.capturedAt],
                ["Qubits", summary.qubits ?? editorState.qubits],
                ["Steps", summary.steps ?? editorState.steps],
                ["Items", summary.itemCount ?? editorState.items?.length],
                ["Selected Items", summary.selectedItemCount ?? editorState.selectedItemIds?.length],
                ["Tool", editorState.activeTool],
                ["Layout", editorState.layout],
                ["Wire Types", editorState.wireTypes],
                ["Wire Labels", editorState.wireLabels],
                ["Item Counts", itemCounts],
                ["Export Issues", editorState.exportIssues]
              ])}
            </div>
            <details><summary>Visual circuit JSON</summary><pre>${escapeHtml(JSON.stringify(snapshot, null, 2))}</pre></details>
          </details>
        `;
      }

      function updateViewButtons() {
        viewActiveButton.classList.toggle("is-active", currentView === "active");
        viewArchivedButton.classList.toggle("is-active", currentView === "archived");
        viewActiveButton.setAttribute("aria-pressed", String(currentView === "active"));
        viewArchivedButton.setAttribute("aria-pressed", String(currentView === "archived"));
      }

      function renderReport(report) {
        const comment = getReportComment(report);
        const meta = [
          report.email ? `<span class="chip">${escapeHtml(report.email)}</span>` : "",
          `<span class="chip">${escapeHtml(report.storage)}</span>`,
          report.status ? `<span class="chip">${escapeHtml(report.status)}</span>` : "",
          report.pageUrl ? `<span class="chip">page captured</span>` : "",
          report.code ? `<span class="chip">code attached</span>` : "",
          report.preamble ? `<span class="chip">preamble attached</span>` : "",
          report.previewImageStorageKey ? `<span class="chip">preview image attached</span>` : "",
          report.interfaceImageStorageKey ? `<span class="chip">interface screenshot attached</span>` : "",
          report.visualCircuitSnapshot ? `<span class="chip">visual circuit attached</span>` : "",
          report.sessionSnapshot ? `<span class="chip">session snapshot attached</span>` : ""
        ].filter(Boolean).join("");

        return `
          <article class="report-card">
            <div class="report-head">
              <div>
                <h2 class="report-title">${escapeHtml(report.title)}</h2>
                <div class="report-meta">${meta}</div>
              </div>
              <div class="report-date">
                ${escapeHtml(formatDate(report.submittedAt))}
                ${report.archivedAt ? `<br />Archived ${escapeHtml(formatDate(report.archivedAt))}` : ""}
              </div>
            </div>
            <p class="description">${comment ? escapeHtml(comment) : "No user comment provided."}</p>
            ${renderScreenshotFigure(report.previewImageStorageKey, "Rendered preview image attached at submission time.")}
            ${renderScreenshotFigure(report.interfaceImageStorageKey, "Visible interface screenshot attached at submission time.")}
            <div class="detail-grid">
              <div class="detail">
                <strong>ID</strong>
                <div>${escapeHtml(report.id)}</div>
              </div>
              <div class="detail">
                <strong>Storage Key</strong>
                <div>${escapeHtml(report.storageKey)}</div>
              </div>
              <div class="detail">
                <strong>Page URL</strong>
                <div>${report.pageUrl ? `<a href="${escapeHtml(report.pageUrl)}" target="_blank" rel="noreferrer">${escapeHtml(report.pageUrl)}</a>` : "Not provided"}</div>
              </div>
              <div class="detail">
                <strong>User Agent</strong>
                <div>${report.userAgent ? escapeHtml(report.userAgent) : "Not provided"}</div>
              </div>
            </div>
            <details>
              <summary>Stored fields</summary>
              <div class="field-list">
                ${renderFieldRow("Status", report.status)}
                ${renderFieldRow("Archived At", report.archivedAt)}
                ${renderFieldRow("Submitted At", report.submittedAt)}
                ${renderFieldRow("Title", report.title)}
                ${renderFieldRow("Comment", comment)}
                ${renderFieldRow("Email", report.email)}
                ${renderFieldRow("Page URL", report.pageUrl, { href: report.pageUrl })}
                ${renderFieldRow("User Agent", report.userAgent)}
                ${renderFieldRow("Storage", report.storage)}
                ${renderFieldRow("Storage Key", report.storageKey)}
                ${renderFieldRow("Preview Image Key", report.previewImageStorageKey)}
                ${renderFieldRow("Preview Image Type", report.previewImageContentType)}
                ${renderFieldRow("Interface Image Key", report.interfaceImageStorageKey)}
                ${renderFieldRow("Interface Image Type", report.interfaceImageContentType)}
              </div>
            </details>
            ${report.code ? `<details><summary>Quantikz code</summary><pre>${escapeHtml(report.code)}</pre></details>` : ""}
            ${report.preamble ? `<details><summary>Preamble</summary><pre>${escapeHtml(report.preamble)}</pre></details>` : ""}
            ${renderVisualCircuitSnapshot(report)}
            ${renderFormattedSnapshot(report)}
            <details><summary>Raw report JSON</summary><pre>${escapeHtml(JSON.stringify(report, null, 2))}</pre></details>
            ${(report.visualCircuitSnapshot || report.code || currentView === "active") ? `
              <div class="report-actions">
                ${report.visualCircuitSnapshot || report.code
                  ? `<button type="button" class="secondary" data-open-report-id="${escapeHtml(report.id)}">Open in editor</button>`
                  : ""}
                ${currentView === "active"
                  ? `<button type="button" class="secondary" data-archive-storage-key="${escapeHtml(report.storageKey)}">Dismiss to archived</button>`
                  : ""}
              </div>
            ` : ""}
          </article>
        `;
      }

      function filteredReports() {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) {
          return reports;
        }

        return reports.filter((report) => {
          return [
            report.title,
            getReportComment(report),
            report.email,
            report.pageUrl,
            report.userAgent,
            report.code,
            report.preamble,
            report.visualCircuitSnapshot,
            report.sessionSnapshot,
            report.status,
            report.archivedAt,
            report.storage,
            report.storageKey,
            report.previewImageStorageKey,
            report.previewImageContentType,
            report.interfaceImageStorageKey,
            report.interfaceImageContentType,
            report.id
          ].some((value) => typeof value === "string" && value.toLowerCase().includes(query));
        });
      }

      function renderReports() {
        const visibleReports = filteredReports();
        countNode.textContent = `${visibleReports.length} report${visibleReports.length === 1 ? "" : "s"}`;

        if (visibleReports.length === 0) {
          reportsNode.innerHTML = `<div class="empty-state">No reports match the current filter.</div>`;
          return;
        }

        reportsNode.innerHTML = visibleReports.map(renderReport).join("");
        void loadStoredImages();
      }

      async function loadStoredImages() {
        const token = tokenInput.value.trim();
        if (!token) {
          return;
        }

        const imageNodes = reportsNode.querySelectorAll("img[data-bug-image-storage-key]");
        await Promise.all(Array.from(imageNodes).map(async (node) => {
          const storageKey = node.getAttribute("data-bug-image-storage-key");
          if (!storageKey) {
            return;
          }

          try {
            const response = await fetch(`${buildApiUrl("/api/bug-reports")}?storageKey=${encodeURIComponent(storageKey)}`, {
              headers: {
                Authorization: `Bearer ${token}`
              }
            });

            if (!response.ok) {
              throw new Error("Unable to load preview image.");
            }

            const blob = await response.blob();
            node.src = URL.createObjectURL(blob);
          } catch {
            node.replaceWith(document.createTextNode("Preview image unavailable."));
          }
        }));
      }

      async function loadReports() {
        const token = tokenInput.value.trim();
        if (!token) {
          setStatus("Enter the admin token first.", "error");
          return;
        }

        sessionStorage.setItem(SESSION_KEY, token);
        setStatus("Loading reports...");
        reportsNode.innerHTML = "";

        try {
          const limit = Math.max(1, Math.min(200, Number.parseInt(limitInput.value || "50", 10) || 50));
          const response = await fetch(`${buildApiUrl("/api/bug-reports")}?limit=${limit}&status=${encodeURIComponent(currentView)}`, {
            headers: {
              Authorization: `Bearer ${token}`
            }
          });
          const payload = await response.json();

          if (!response.ok || !payload.success) {
            throw new Error(payload.error || "Unable to load bug reports.");
          }

          reports = payload.reports;
          renderReports();
          setStatus(`Loaded ${reports.length} ${currentView} report${reports.length === 1 ? "" : "s"}.`, "success");
        } catch (error) {
          reports = [];
          renderReports();
          setStatus(error instanceof Error ? error.message : "Unable to load bug reports.", "error");
        }
      }

      async function archiveReport(storageKey) {
        const token = tokenInput.value.trim();
        if (!token) {
          setStatus("Enter the admin token first.", "error");
          return;
        }

        setStatus("Archiving report...");

        try {
          const response = await fetch(buildApiUrl("/api/bug-reports"), {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ action: "archive", storageKey })
          });
          const payload = await response.json();

          if (!response.ok || !payload.success) {
            throw new Error(payload.error || "Unable to archive bug report.");
          }

          reports = reports.filter((report) => report.storageKey !== storageKey);
          renderReports();
          setStatus("Bug report archived.", "success");
        } catch (error) {
          setStatus(error instanceof Error ? error.message : "Unable to archive bug report.", "error");
        }
      }

      loadButton.addEventListener("click", loadReports);
      viewActiveButton.addEventListener("click", () => {
        currentView = "active";
        updateViewButtons();
        void loadReports();
      });
      viewArchivedButton.addEventListener("click", () => {
        currentView = "archived";
        updateViewButtons();
        void loadReports();
      });
      clearButton.addEventListener("click", () => {
        sessionStorage.removeItem(SESSION_KEY);
        tokenInput.value = "";
        reports = [];
        renderReports();
        setStatus("Admin token cleared.");
      });
      searchInput.addEventListener("input", renderReports);
      reportsNode.addEventListener("click", (event) => {
        const openButton = event.target.closest("button[data-open-report-id]");
        if (openButton instanceof HTMLButtonElement) {
          const reportId = openButton.getAttribute("data-open-report-id");
          const report = reportId ? reports.find((candidate) => candidate.id === reportId) : null;

          if (!report) {
            setStatus("Unable to find the selected report.", "error");
            return;
          }

          openReportInEditor(report);
          return;
        }

        const button = event.target.closest("button[data-archive-storage-key]");
        if (!(button instanceof HTMLButtonElement)) {
          return;
        }

        const storageKey = button.getAttribute("data-archive-storage-key");
        if (!storageKey) {
          return;
        }

        void archiveReport(storageKey);
      });

      const storedToken = sessionStorage.getItem(SESSION_KEY);
      if (storedToken) {
        tokenInput.value = storedToken;
      }

      updateViewButtons();
      renderReports();
    </script>
  </body>
</html>
