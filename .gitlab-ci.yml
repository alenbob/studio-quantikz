stages:
  - test
  - build

default:
  image: node:22-bookworm
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends python3
    - npm ci --cache .npm --prefer-offline

test:
  stage: test
  script:
    - npm test

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week